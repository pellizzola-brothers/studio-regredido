<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pellizzola Brothers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── MODAL LIMPAR ── -->
  <div id="modal-overlay">
    <div id="modal-box">
      <div id="modal-header">
        <div class="modal-icon">⚠</div>
        <span id="modal-title">LIMPAR GRADE</span>
      </div>
      <div id="modal-body">
        Todos os blocos serão removidos do mapa.<br>
        <strong>Esta ação não pode ser desfeita.</strong><br>
        Deseja continuar?
      </div>
      <div id="modal-footer">
        <button class="btn-modal-cancel" id="modal-cancel">Cancelar</button>
        <button class="btn-modal-confirm" id="modal-confirm">Limpar tudo</button>
      </div>
    </div>
  </div>

  <div id="app">

    <!-- ── TOPBAR ── -->
    <div id="topbar">
      <div id="logo">
        <div class="logo-icon">✦</div>
        PELLIZZOLA <span class="logo-accent">BROTHERS</span>
      </div>
      <div class="header-tag">GRID 30 × 20</div>
      <div id="header-actions">
        <button class="btn btn-ghost" id="openMap">▲ Abrir JSON</button>
        <button class="btn btn-danger" id="clearMap">✕ Limpar</button>
        <button class="btn btn-save" id="saveMap">▼ Salvar JSON</button>
      </div>
    </div>

    <!-- ── MAIN ── -->
    <div id="main-layout">

      <!-- ── SIDEBAR ── -->
      <div id="sidebar">

        <div class="sidebar-block">
          <div class="section-label">Metadados</div>
          <div class="meta-field">
            <span class="meta-label">Nome</span>
            <input class="meta-input" id="level-name" type="text" placeholder="nivel" maxlength="64">
          </div>
          <div class="meta-field">
            <span class="meta-label">Descrição</span>
            <input class="meta-input" id="level-description" type="text" placeholder="..." maxlength="128">
          </div>
          <div class="meta-field">
            <span class="meta-label">Autor</span>
            <input class="meta-input" id="level-author" type="text" placeholder="autor" maxlength="64">
          </div>
        </div>

        <div class="sidebar-block" id="block-panel">
          <div class="section-label">Blocos</div>

          <!-- Busca -->
          <div class="block-search-wrap">
            <span class="block-search-icon">⌕</span>
            <input class="block-search" id="block-search" type="text" placeholder="Buscar blocos..." autocomplete="off">
          </div>

          <!-- Filtros de categoria -->
          <div class="cat-scroll">
            <div class="cat-filters" id="cat-filters">
              <button class="cat-btn active" data-cat="todos">Todos</button>
              <button class="cat-btn" data-cat="estrutura">Estrutura</button>
              <button class="cat-btn" data-cat="interacao">Interação</button>
              <button class="cat-btn" data-cat="perigo">Perigo</button>
              <button class="cat-btn" data-cat="movimento">Movimento</button>
              <button class="cat-btn" data-cat="logica">Lógica</button>
              <button class="cat-btn" data-cat="decoracao">Decoração</button>
              <button class="cat-btn" data-cat="favoritos">★ Favs</button>
              <button class="cat-btn" data-cat="recentes">⟳ Recentes</button>
            </div>
          </div>

          <!-- Grid de blocos -->
          <div class="block-grid" id="block-grid"></div>

          <!-- Apagar sempre visível -->
          <div class="eraser-row">
            <div class="sprite-item" data-id="0" id="eraser-item">
              <div class="tool-preview eraser-preview">✕</div>
              <div class="tool-info">
                <span class="tool-name">Apagar</span>
                <span class="tool-desc">Borracha</span>
              </div>
            </div>
          </div>
        </div>

        <div class="sidebar-block">
          <div class="section-label">Status</div>
          <div id="status-info">
            <div class="status-row">
              <span class="status-label">Start</span>
              <span class="status-badge badge-off" id="st-start">✗</span>
            </div>
            <div class="status-row">
              <span class="status-label">End</span>
              <span class="status-badge badge-off" id="st-end">✗</span>
            </div>
            <div class="status-row">
              <span class="status-label">Tiles</span>
              <span class="status-badge badge-neutral" id="st-tiles">0</span>
            </div>
          </div>
        </div>

      </div><!-- /sidebar -->

      <!-- ── CANVAS ── -->
      <div id="canvas-area">
        <div id="canvas-wrapper">
          <canvas id="gameCanvas"></canvas>
          <div id="coords-display">X: — | Y: —</div>
        </div>
      </div>

    </div><!-- /main-layout -->

    <!-- ── BOTTOM BAR ── -->
    <div id="bottom-bar">
      <span class="bottom-info">PELLIZZOLA BROTHERS v1.0</span>
      <span class="bottom-info" id="bottom-coords">CURSOR: —</span>
    </div>

  </div><!-- /app -->

  <script src="script.js"></script>
</body>
</html>
